name: ML Pipeline CI/CD

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run training
        run: python src/train.py

      - name: Run prediction test
        run: python src/predict.py

      # 🔥 NEW: Docker Build
      - name: Build Docker image
        run: docker build -t ml-pipeline .

      # 🔥 NEW: Login Docker Hub
      - name: Login to DockerHub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # 🔥 NEW: Tag image
      - name: Tag image
        run: docker tag ml-pipeline ${{ secrets.DOCKER_USERNAME }}/ml-pipeline:latest

      # 🔥 NEW: Push image
      - name: Push image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/ml-pipeline:latest